name: Refresh Instagram Token

# 50日ごとにトークンを更新（60日失効の前に確実に延長）
on:
  schedule:
    - cron: "0 3 1 */1 *"   # 毎月1日 03:00 UTC（60日より十分短い間隔）
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Refresh token
        id: refresh
        env:
          FB_APP_ID: ${{ secrets.FB_APP_ID }}
          FB_APP_SECRET: ${{ secrets.FB_APP_SECRET }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: python src/refresh_token.py
      - name: Update secret
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}   # repo の secrets 書き込み権を持つ PAT
        run: |
          echo "${{ steps.refresh.outputs.new_token }}" | gh secret set IG_ACCESS_TOKEN --repo "${{ github.repository }}"
